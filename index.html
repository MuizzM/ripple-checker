<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HFS Ripple Checker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; min-height: 100vh; padding: 16px; max-width: 600px; margin: 0 auto; }

.hdr { background: #111; border-radius: 16px; padding: 14px 16px; margin-bottom: 16px; border-left: 4px solid #3b82f6; }
.hdr h1 { font-size: 20px; font-weight: 900; letter-spacing: -1px; }
.hdr p { font-size: 11px; color: #555; margin-top: 2px; }

textarea { width: 100%; height: 180px; background: #111; border: 1px solid #333; border-radius: 14px; padding: 14px; color: #fff; font-size: 14px; font-family: monospace; resize: vertical; }
textarea::placeholder { color: #444; }

.btn { width: 100%; padding: 16px; border-radius: 14px; border: none; color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px; display: block; }
.btn-blue { background: #3b82f6; }
.btn-green { background: #16a34a; }
.btn-red { background: #dc2626; }
.btn-dark { background: #222; font-size: 13px; }
.btn:disabled { opacity: 0.5; }

.card { background: #111; border-radius: 14px; padding: 14px; margin-top: 12px; border: 1px solid #222; }

.stats { display: flex; gap: 8px; margin-top: 12px; }
.stat { border-radius: 12px; padding: 14px 8px; text-align: center; flex: 1; }
.stat .num { font-size: 26px; font-weight: 900; }
.stat .lbl { font-size: 10px; margin-top: 2px; }
.stat-green { background: #052e16; }
.stat-green .lbl { color: #4ade80; }
.stat-red { background: #450a0a; }
.stat-red .lbl { color: #f87171; }
.stat-gray { background: #1a1a1a; }
.stat-gray .lbl { color: #666; }

.pct { text-align: center; padding: 10px; font-size: 14px; color: #fbbf24; font-weight: 800; }

.prog { background: #222; border-radius: 10px; height: 10px; overflow: hidden; margin: 8px 0; }
.prog-bar { background: #3b82f6; height: 100%; border-radius: 10px; transition: width 0.5s; }

.row { display: flex; align-items: center; padding: 10px 8px; border-bottom: 1px solid #1a1a1a; }
.row:nth-child(even) { background: #0a0a0a; }
.row-num { width: 50px; font-weight: 900; font-size: 15px; color: #3b82f6; text-align: center; }
.row-info { flex: 1; min-width: 0; margin: 0 8px; }
.row-owner { font-size: 12px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-street { font-size: 10px; color: #555; }
.row-date { font-size: 10px; color: #444; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
.tag-skip { background: #052e16; color: #4ade80; }
.tag-knock { background: #450a0a; color: #f87171; }
.tag-na { background: #1a1a1a; color: #555; }

.err { background: #450a0a; border-radius: 12px; padding: 12px; margin-top: 12px; font-size: 13px; color: #fca5a5; }
.hide { display: none; }

#results-list { max-height: 60vh; overflow-y: auto; border-radius: 14px; border: 1px solid #222; }
</style>
</head>
<body>

<div class="hdr">
  <h1>⚡ HFS RIPPLE CHECK</h1>
  <p>Paste addresses → get knock list with CSV</p>
</div>

<!-- INPUT -->
<div id="v-input">
  <textarea id="input" placeholder="Paste one address per line:&#10;&#10;1515 Laggan Ln Indian Trail NC 28079&#10;1303 Tollcross Rd Indian Trail NC 28079&#10;905 Ocean Ct Carthage NC 28327&#10;&#10;Or with owner name:&#10;SMITH JOHN|123 Main St Statesville NC 28677"></textarea>
  <button class="btn btn-blue" onclick="parseAddresses()">PARSE ADDRESSES</button>
</div>

<!-- PARSED -->
<div id="v-parsed" class="hide">
  <div class="card">
    <div style="font-size:15px;font-weight:800" id="parse-count"></div>
    <div id="parse-list" style="max-height:200px;overflow:auto;margin-top:8px;font-size:12px"></div>
  </div>
  <button class="btn btn-green" onclick="runCheck()">🔍 CHECK ALL</button>
  <button class="btn btn-dark" onclick="showInput()">← Back</button>
</div>

<!-- RUNNING -->
<div id="v-running" class="hide">
  <div class="card">
    <div style="display:flex;justify-content:space-between;font-size:13px">
      <span id="run-addr" style="font-weight:700"></span>
      <span id="run-count" style="color:#3b82f6;font-weight:800"></span>
    </div>
    <div class="prog"><div class="prog-bar" id="run-bar"></div></div>
    <div id="run-eta" style="font-size:10px;color:#444"></div>
  </div>
  <div class="stats" id="run-stats"></div>
  <div id="run-err" class="err hide"></div>
  <button class="btn btn-red" onclick="stopCheck()">⏹ STOP</button>
</div>

<!-- RESULTS -->
<div id="v-results" class="hide">
  <div class="stats" id="res-stats"></div>
  <div class="pct" id="res-pct"></div>
  <div id="results-list"></div>
  <button class="btn btn-blue" onclick="downloadCSV()">⬇️ DOWNLOAD CSV</button>
  <button class="btn btn-dark" onclick="resetAll()">🔄 NEW CHECK</button>
</div>

<script>
const API = "https://ripple-api.spitfireinbound.com/api";
let homes = [], results = [], stopped = false, corsProxy = "";

function $(id) { return document.getElementById(id); }
function show(id) { ["v-input","v-parsed","v-running","v-results"].forEach(v => $(v).classList.toggle("hide", v !== id)); }
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
function showInput() { show("v-input"); }

async function tryFetch(url) {
  // Try direct first
  try {
    const r = await fetch(corsProxy + url);
    if (r.ok) return await r.json();
    if (r.status === 429) { await wait(20000); return null; }
  } catch(e) {
    // If CORS fails, try proxy
    if (!corsProxy && e.message.includes("fetch")) {
      corsProxy = "https://corsproxy.io/?url=";
      try {
        const r = await fetch(corsProxy + encodeURIComponent(url));
        if (r.ok) return await r.json();
      } catch(e2) {
        corsProxy = "https://api.allorigins.win/raw?url=";
        try {
          const r = await fetch(corsProxy + encodeURIComponent(url));
          if (r.ok) return await r.json();
        } catch(e3) {}
      }
    }
  }
  return null;
}

function parseAddresses() {
  const raw = $("input").value.trim();
  if (!raw) return;
  
  const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
  homes = [];
  const seen = new Set();

  for (const line of lines) {
    let owner = "", addr = "";
    
    if (line.includes("|")) {
      [owner, addr] = line.split("|").map(s => s.trim());
    } else {
      const m = line.match(/^(\d+\s+.+)/);
      if (m) addr = m[1].trim();
    }
    
    if (!addr) continue;
    const num = addr.match(/^\d+/)?.[0];
    if (!num || seen.has(num + addr.slice(num.length, num.length + 15))) continue;
    seen.add(num + addr.slice(num.length, num.length + 15));
    
    // Clean up
    if (!addr.match(/\d{5}/) && !addr.match(/NC/i)) addr += " NC";
    homes.push({ owner, address: addr });
  }

  if (!homes.length) return alert("No addresses found. Put one address per line.");
  
  $("parse-count").textContent = `✅ ${homes.length} addresses ready`;
  $("parse-list").innerHTML = homes.map((h, i) => {
    const num = h.address.match(/^\d+/)?.[0] || "";
    const rest = h.address.replace(/^\d+\s*/, "").slice(0, 40);
    return `<div style="padding:4px 0;border-bottom:1px solid #1a1a1a"><span style="color:#3b82f6;font-weight:700">${num}</span> <span style="color:#888">${rest}</span>${h.owner ? ` <span style="color:#555;font-size:10px">— ${h.owner.slice(0,20)}</span>` : ""}</div>`;
  }).join("");
  
  show("v-parsed");
}

function renderStats(target, cn, kn, ni) {
  $(target).innerHTML = `
    <div class="stat stat-green"><div class="num">${cn}</div><div class="lbl">CONNECTED</div></div>
    <div class="stat stat-red"><div class="num">${kn}</div><div class="lbl">KNOCK</div></div>
    <div class="stat stat-gray"><div class="num">${ni}</div><div class="lbl">NOT IN RIPPLE</div></div>
  `;
}

async function runCheck() {
  show("v-running");
  stopped = false;
  results = [];
  const aC = {}, sC = {};

  for (let i = 0; i < homes.length; i++) {
    if (stopped) break;
    const h = homes[i];
    const num = h.address.match(/^\d+/)?.[0] || "";
    const stM = h.address.match(/\d+\s+(.+?)(?:\s+(?:Statesville|Monroe|Indian Trail|Carthage|Whispering|High Point|NC|28\d))/i);
    const street = stM ? stM[1].trim() : h.address.replace(/^\d+\s*/, "").split(/\s+NC/i)[0].trim();
    const kw = street.split(" ")[0].toLowerCase();

    $("run-addr").textContent = `${num} ${street}`;
    $("run-count").textContent = `${i + 1}/${homes.length}`;
    $("run-bar").style.width = `${((i + 1) / homes.length) * 100}%`;
    $("run-eta").textContent = `~${Math.round((homes.length - i) * 8 / 60)} min left • Don't close`;

    try {
      // Search (cached by street keyword)
      if (!sC[kw]) {
        const url = `${API}/predefined-premises?address=${encodeURIComponent(h.address)}&service_provider=ripple`;
        sC[kw] = await tryFetch(url);
        await wait(5000);
      }

      const arr = sC[kw]?.addressArray || [];
      const match = arr.find(a => (a.full_text.startsWith(num + ",") || a.full_text.startsWith(num + " ")) && a.full_text.toLowerCase().includes(kw));

      if (!match) {
        results.push({ num: parseInt(num) || 0, street, address: h.address, owner: h.owner, inRipple: false, fiber: false, connected: false, date: "" });
      } else {
        // Fiber
        const aid = match.area_id || "";
        if (aid && !aC[aid]) {
          await wait(3000);
          const url2 = `${API}/area-has-fiber?areaId=${aid}&service_provider=ripple`;
          aC[aid] = await tryFetch(url2);
        }
        const fiber = aC[aid]?.areaHasFiber === "Connected";

        // Service
        let connected = false;
        if (match.premise_id) {
          await wait(3000);
          const url3 = `${API}/query-existing-service?premiseGuid=${match.premise_id}&service_provider=ripple`;
          const sd = await tryFetch(url3);
          if (sd?.premiseHasService) connected = true;
        }

        results.push({ num: parseInt(num) || 0, street, address: h.address, owner: h.owner, inRipple: true, fiber, connected, date: match.created_at?.slice(0, 10) || "" });
      }
    } catch (e) {
      $("run-err").textContent = "❌ " + e.message;
      $("run-err").classList.remove("hide");
      results.push({ num: parseInt(num) || 0, street, address: h.address, owner: h.owner, inRipple: false, fiber: false, connected: false, date: "" });
    }

    const cn = results.filter(r => r.connected).length;
    const kn = results.filter(r => r.inRipple && !r.connected).length;
    const ni = results.filter(r => !r.inRipple).length;
    renderStats("run-stats", cn, kn, ni);
  }

  showResults();
}

function stopCheck() { stopped = true; showResults(); }

function showResults() {
  show("v-results");
  const sorted = [...results].sort((a, b) => a.street.localeCompare(b.street) || a.num - b.num);
  
  const cn = sorted.filter(r => r.connected).length;
  const kn = sorted.filter(r => r.inRipple && !r.connected).length;
  const ni = sorted.filter(r => !r.inRipple).length;
  
  renderStats("res-stats", cn, kn, ni);
  $("res-pct").textContent = cn + kn > 0 ? `📊 ${Math.round(cn / (cn + kn) * 100)}% Penetration` : "";

  $("results-list").innerHTML = sorted.map((r, i) => {
    const tag = r.connected ? '<span class="tag tag-skip">SKIP</span>' :
                r.inRipple ? '<span class="tag tag-knock">KNOCK</span>' :
                '<span class="tag tag-na">N/A</span>';
    return `<div class="row">
      <div class="row-num">${r.num}</div>
      <div class="row-info">
        <div class="row-owner">${r.owner || r.address.replace(/^\d+\s*/, "").slice(0, 30)}</div>
        <div class="row-street">${r.street}</div>
        ${r.date ? `<div class="row-date">${r.date}</div>` : ""}
      </div>
      <div>${r.fiber ? "📡 " : ""}${tag}</div>
    </div>`;
  }).join("");
}

function downloadCSV() {
  const sorted = [...results].sort((a, b) => a.street.localeCompare(b.street) || a.num - b.num);
  let csv = "House Number,Street,Address,Owner,In Ripple,Fiber,Connected,Created\n";
  csv += sorted.map(r =>
    `${r.num},"${r.street}","${r.address}","${r.owner}",${r.inRipple ? "YES" : "NO"},${r.fiber ? "YES" : "NO"},${r.connected ? "YES" : "NO"},${r.date}`
  ).join("\n");
  
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `Ripple_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

function resetAll() {
  homes = []; results = []; $("input").value = "";
  show("v-input");
}
</script>
</body>
</html>
