<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Ripple Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0a0a;color:#fafafa;min-height:100vh;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}

/* LAYOUT */
.page{padding:16px 16px 100px}
.gap-8{margin-top:8px}.gap-12{margin-top:12px}.gap-16{margin-top:16px}.gap-24{margin-top:24px}

/* HEADER */
.logo{display:flex;align-items:center;gap:10px;padding:20px 0 8px}
.logo img{height:24px;filter:brightness(1.8)}
.logo span{font-size:11px;color:#525252;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* TYPOGRAPHY */
h2{font-size:15px;font-weight:800;color:#fafafa;letter-spacing:-0.3px}
.sub{font-size:12px;color:#525252;font-weight:500;margin-top:2px}

/* INPUTS */
textarea{width:100%;height:180px;background:#141414;border:1px solid #262626;border-radius:12px;padding:14px;color:#fafafa;font-size:14px;font-family:'SF Mono',monospace;resize:none;transition:border .2s}
textarea:focus{outline:none;border-color:#3b82f6}
textarea::placeholder{color:#404040}

/* BUTTONS */
.btn{width:100%;padding:16px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn:active{opacity:.85}
.btn-primary{background:#fafafa;color:#0a0a0a}
.btn-danger{background:#dc2626;color:#fff}
.btn-ghost{background:transparent;border:1px solid #262626;color:#a3a3a3;font-size:13px;padding:12px}

/* CARDS */
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi-card{background:#141414;border-radius:12px;padding:14px 8px;text-align:center;border:1px solid #1a1a1a}
.kpi-num{font-size:28px;font-weight:900;letter-spacing:-1px}
.kpi-lbl{font-size:10px;color:#525252;font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.kpi-green .kpi-num{color:#22c55e}
.kpi-red .kpi-num{color:#ef4444}
.kpi-blue .kpi-num{color:#3b82f6}

/* REVENUE BANNER */
.rev{background:#141414;border:1px solid #1a1a1a;border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center}
.rev-amount{font-size:32px;font-weight:900;color:#22c55e;letter-spacing:-1px}
.rev-label{font-size:11px;color:#525252;font-weight:600}
.rev-count{font-size:12px;color:#737373}

/* PROGRESS */
.progress{background:#1a1a1a;border-radius:12px;padding:16px}
.prog-bar-wrap{background:#262626;border-radius:6px;height:4px;margin:10px 0 6px;overflow:hidden}
.prog-bar-fill{background:#3b82f6;height:100%;border-radius:6px;transition:width .4s}
.prog-info{display:flex;justify-content:space-between;font-size:12px;color:#525252}

/* FILTERS */
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:20px;border:1px solid #262626;background:#141414;color:#737373;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.chip.on{background:#fafafa;color:#0a0a0a;border-color:#fafafa}

/* SEARCH */
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#404040}
.search{width:100%;background:#141414;border:1px solid #262626;border-radius:10px;padding:10px 12px 10px 36px;color:#fafafa;font-size:13px;font-family:'Inter',sans-serif}
.search:focus{outline:none;border-color:#3b82f6}

/* TABLE */
.list{border-radius:12px;overflow:hidden;border:1px solid #1a1a1a}
.row{display:flex;align-items:stretch;border-bottom:1px solid #141414;background:#0a0a0a;cursor:pointer;transition:background .1s}
.row:active{background:#1a1a1a}
.row:last-child{border-bottom:none}
.row-score{width:44px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.row-score.hi{color:#22c55e;background:#0a1a0e}.row-score.md{color:#f59e0b;background:#1a1608}.row-score.lo{color:#ef4444;background:#1a0a0a}.row-score.no{color:#404040;background:#0f0f0f}
.row-body{flex:1;padding:10px 12px;min-width:0}
.row-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.row-num{font-size:15px;font-weight:800;color:#fafafa}
.row-street{font-size:12px;color:#525252;font-weight:500}
.row-owner{font-size:13px;color:#a3a3a3;font-weight:500;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-date{font-size:11px;color:#404040;margin-top:1px}
.row-right{width:90px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 4px}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.b-hot{background:#431407;color:#fb923c}.b-knock{background:#1c1917;color:#a3a3a3}.b-skip{background:#052e16;color:#4ade80}.b-na{background:#141414;color:#404040}

/* DROPDOWN */
.sel{width:100%;background:#141414;border:1px solid #262626;border-radius:8px;color:#a3a3a3;font-size:11px;font-weight:600;padding:6px 4px;font-family:'Inter',sans-serif;cursor:pointer;-webkit-appearance:none;text-align:center}
.sel:focus{outline:none;border-color:#3b82f6}
.sel.s-sold{background:#052e16;color:#22c55e;border-color:#16653433}
.sel.s-noint{background:#1a0a0a;color:#ef4444;border-color:#ef444433}
.sel.s-nothome{background:#1a1a1a;color:#737373}
.sel.s-callback{background:#0c0a1e;color:#818cf8;border-color:#6366f133}
.sel.s-later{background:#1a1408;color:#f59e0b;border-color:#f59e0b33}

/* PITCH PANEL */
.pitch{display:none;background:#141414;border-bottom:1px solid #1a1a1a;padding:14px 16px}
.pitch.open{display:block}
.pitch-type{font-size:10px;font-weight:700;color:#a855f7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.pitch-msg{font-size:13px;line-height:1.7;color:#d4d4d4}
.pitch-msg b{color:#fafafa}
.pitch-actions{display:flex;gap:8px;margin-top:10px}
.pitch-btn{padding:6px 14px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.pitch-btn-copy{background:#a855f7;color:#fff}

/* RESUME */
.resume-card{background:#141414;border:1px solid #262626;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.resume-card h3{font-size:16px;font-weight:800;margin-bottom:4px}
.resume-card p{font-size:12px;color:#525252;margin-bottom:14px}
.resume-btns{display:flex;gap:8px}
.resume-btns .btn{flex:1;padding:14px}

/* KNOCK PILLS */
.knock-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#141414;border:1px solid #262626;color:#737373}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#052e16;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}

/* FOOTER ACTIONS */
.footer-actions{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #1a1a1a;padding:10px 16px;display:flex;gap:8px;max-width:480px;margin:0 auto;z-index:10}
.footer-actions .btn{padding:12px;font-size:13px}

.hide{display:none}
</style>
</head>
<body>
<div class="page">

<!-- TOAST -->
<div class="toast" id="toast">✓ Saved</div>

<!-- RESUME -->
<div id="v-resume" class="resume-card hide">
<h3>Resume last session?</h3>
<p id="resume-info"></p>
<div class="resume-btns">
<button class="btn btn-primary" onclick="loadSession()">Resume</button>
<button class="btn btn-ghost" onclick="clearSession()">Start Fresh</button>
</div>
</div>

<!-- INPUT -->
<div id="v-input">
<div class="logo">
<img src="https://ripplefiber.com/wp-content/uploads/2023/06/Ripple-Fiber-Logo-1-1.png" alt="Ripple" onerror="this.style.display='none'">
<span>Field Tool</span>
</div>
<h2>Check addresses</h2>
<p class="sub">Paste one per line, or OWNER|ADDRESS format</p>
<textarea id="input" class="gap-12" placeholder="1515 Laggan Ln Indian Trail NC 28079&#10;1303 Tollcross Rd Indian Trail NC 28079&#10;&#10;SMITH JOHN|514 Western Ave Statesville NC 28677"></textarea>
<button class="btn btn-primary gap-12" onclick="parseAddresses()">Continue</button>
</div>

<!-- PARSED -->
<div id="v-parsed" class="hide">
<h2 id="parse-title"></h2>
<p class="sub">Review and check against Ripple</p>
<div id="parse-list" class="gap-12" style="max-height:220px;overflow:auto"></div>
<button class="btn btn-primary gap-16" onclick="runCheck()">Check All</button>
<button class="btn btn-ghost gap-8" onclick="showView('v-input')">← Edit addresses</button>
</div>

<!-- RUNNING -->
<div id="v-running" class="hide">
<h2>Checking addresses...</h2>
<div class="progress gap-16">
<div style="display:flex;justify-content:space-between;align-items:center">
<span id="run-addr" style="font-size:13px;font-weight:600"></span>
<span id="run-count" style="font-size:13px;font-weight:800;color:#3b82f6"></span>
</div>
<div class="prog-bar-wrap"><div class="prog-bar-fill" id="run-bar"></div></div>
<div class="prog-info"><span id="run-eta"></span><span>Don't close app</span></div>
</div>
<div class="kpi gap-12" id="run-stats"></div>
<button class="btn btn-danger gap-16" onclick="stopCheck()">Stop</button>
</div>

<!-- RESULTS -->
<div id="v-results" class="hide">
<div class="logo">
<img src="https://ripplefiber.com/wp-content/uploads/2023/06/Ripple-Fiber-Logo-1-1.png" alt="Ripple" onerror="this.style.display='none'">
<span>Results</span>
</div>

<!-- Revenue -->
<div class="rev gap-8">
<div><div class="rev-amount" id="rev-amount">$0</div><div class="rev-label">Revenue</div></div>
<div style="text-align:right"><div class="rev-count" id="rev-sold">0 sold</div><div class="rev-count" id="rev-projected"></div></div>
</div>

<!-- KPIs -->
<div class="kpi gap-12" id="res-stats"></div>

<!-- Knock tracking pills -->
<div class="knock-pills gap-8" id="knock-pills"></div>

<!-- Filters -->
<div class="chips gap-12">
<button class="chip on" onclick="setFilter('all')" id="f-all">All</button>
<button class="chip" onclick="setFilter('hot')" id="f-hot">🔥 Hot</button>
<button class="chip" onclick="setFilter('knock')" id="f-knock">Knock</button>
<button class="chip" onclick="setFilter('skip')" id="f-skip">Skip</button>
<button class="chip" onclick="setFilter('sold')" id="f-sold">💰 Sold</button>
<button class="chip" onclick="setFilter('nothome')" id="f-nothome">Not Home</button>
<button class="chip" onclick="setFilter('callback')" id="f-callback">Callback</button>
</div>

<!-- Search -->
<div class="search-wrap gap-8">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
<input class="search" id="search-box" placeholder="Search owner or street..." oninput="renderList()">
</div>

<!-- Sort -->
<div class="chips gap-8">
<button class="chip on" onclick="sortBy('score')" id="sb-score">Best leads</button>
<button class="chip" onclick="sortBy('street')" id="sb-street">Street</button>
<button class="chip" onclick="sortBy('walk')" id="sb-walk">Walk order</button>
<button class="chip" onclick="sortBy('date')" id="sb-date">Newest</button>
</div>

<!-- List -->
<div class="list gap-8" id="result-list"></div>
</div>
</div>

<!-- FOOTER -->
<div class="footer-actions hide" id="footer">
<button class="btn btn-ghost" style="flex:1" onclick="downloadCSV()">↓ CSV</button>
<button class="btn btn-ghost" style="flex:1" onclick="printKnock()">🖨 Print</button>
<button class="btn btn-ghost" style="flex:1" onclick="resetAll()">New</button>
</div>

<script>
const API="https://ripple-api.spitfireinbound.com/api",SK="hfs_s",KK="hfs_k";
let homes=[],results=[],stopped=false,sortMode="score",filterMode="all",openIdx=-1;
let ks={};try{ks=JSON.parse(localStorage.getItem(KK)||"{}")}catch(e){}

const $=id=>document.getElementById(id),wait=ms=>new Promise(r=>setTimeout(r,ms));
async function api(url){try{const r=await fetch(url);if(r.ok)return r.json();if(r.status===429)await wait(20000)}catch(e){}return null}

function showView(id){["v-input","v-parsed","v-running","v-results"].forEach(v=>$(v).classList.toggle("hide",v!==id));$("footer").classList.toggle("hide",id!=="v-results")}
function toast(msg){const t=$("toast");t.textContent=msg||"✓ Saved";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1400)}
function save(){try{localStorage.setItem(SK,JSON.stringify({homes,results,ts:Date.now()}));localStorage.setItem(KK,JSON.stringify(ks));toast()}catch(e){}}

function checkResume(){try{const d=JSON.parse(localStorage.getItem(SK));if(d?.results?.length){const m=Math.round((Date.now()-d.ts)/6e4);const t=m<60?m+"m ago":Math.round(m/60)+"h ago";const s=Object.values(ks).filter(v=>v==="sold").length;$("resume-info").textContent=d.results.length+" addresses · "+t+(s?" · "+s+" sold":"");$("v-resume").classList.remove("hide");$("v-input").classList.add("hide")}}catch(e){}}
function loadSession(){try{const d=JSON.parse(localStorage.getItem(SK));if(d){homes=d.homes||[];results=d.results||[];showResults()}}catch(e){}$("v-resume").classList.add("hide")}
function clearSession(){try{localStorage.removeItem(SK)}catch(e){}$("v-resume").classList.add("hide");showView("v-input")}

function kKey(r){return r.num+"|"+r.street}
function kGet(r){return ks[kKey(r)]||""}
function kSet(idx,val){const r=results[idx];if(val)ks[kKey(r)]=val;else delete ks[kKey(r)];save();renderList();updateRevenue();updatePills()}

const KOPTS=[{v:"",l:"—"},{v:"sold",l:"💰 Sold",c:"s-sold"},{v:"noint",l:"❌ No",c:"s-noint"},{v:"nothome",l:"🏠 NH",c:"s-nothome"},{v:"callback",l:"📞 CB",c:"s-callback"},{v:"later",l:"⏰ Later",c:"s-later"}];

function ownerType(n){if(!n)return"";const u=n.toUpperCase();if(/LLC|LP\b|INC\b|CORP|PROPERTIES|HOLDINGS|BORROWER|PROPCO|RENTAL|MORTGAGE|BANK/.test(u))return"corp";return""}
function fname(o){if(!o)return"neighbor";const p=o.split(/[,&]/)[0].trim().split(/\s+/);return p.length>=2?p[1].charAt(0)+p[1].slice(1).toLowerCase():p[0].charAt(0)+p[0].slice(1).toLowerCase()}

function score(r){
if(r.connected)return 0;if(!r.inRipple)return-1;
let s=50;if(r.fiber)s+=20;else s-=30;if(!ownerType(r.owner))s+=15;else s-=10;
if(r.date){const d=(Date.now()-new Date(r.date).getTime())/864e5;if(d<90)s+=20;else if(d<180)s+=10;else if(d<365)s+=5}
const nb=results.filter(x=>x.street===r.street);if(nb.length){const cp=nb.filter(x=>x.connected).length/nb.length;if(cp>.3)s+=10}
return Math.max(0,Math.min(100,s))}

function pitch(r){
if(r.connected)return"Already a Ripple customer.";if(!r.inRipple)return"Not in Ripple's footprint yet.";
const n=fname(r.owner),nb=results.filter(x=>x.street===r.street&&x.connected).sort((a,b)=>Math.abs(a.num-r.num)-Math.abs(b.num-r.num));
if(nb.length>=2)return`Hey ${n}, I was just at ${fname(nb[0].owner)}'s at ${nb[0].num} and ${fname(nb[1].owner)}'s at ${nb[1].num} — they're both on Ripple fiber now. 2 gig speeds for less than Spectrum. Didn't want you to miss out.`;
if(nb.length===1)return`Hey ${n}, your neighbor ${fname(nb[0].owner)} at ${nb[0].num} just got activated on Ripple fiber — 2 gig speeds. Have you had a chance to check it out?`;
const days=r.date?(Date.now()-new Date(r.date).getTime())/864e5:999;
if(days<180)return`Hey ${n}, welcome to the neighborhood! They just finished running fiber on your street. 2 gig Ripple fiber — want to see the plans?`;
return`Hey ${n}, they just ran Ripple fiber on your street — 2 gig speeds, way faster than Spectrum. You're one of the first to get access. Want me to show you the options?`}

// PARSE
function parseAddresses(){
const raw=$("input").value.trim();if(!raw)return;
homes=[];const seen=new Set();
raw.split("\n").map(l=>l.trim()).filter(Boolean).forEach(line=>{
let o="",a="";if(line.includes("|")){[o,a]=line.split("|").map(s=>s.trim())}else{const m=line.match(/^(\d+\s+.+)/);if(m)a=m[1].trim()}
if(!a)return;const num=a.match(/^\d+/)?.[0];if(!num||seen.has(num+a.slice(num.length,num.length+20)))return;
seen.add(num+a.slice(num.length,num.length+20));if(!a.match(/\d{5}/)&&!a.match(/NC/i))a+=" NC";homes.push({owner:o,address:a})});
if(!homes.length)return;
$("parse-title").textContent=homes.length+" addresses";
$("parse-list").innerHTML=homes.map((h,i)=>{const num=h.address.match(/^\d+/)?.[0]||"";
return`<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a;gap:10px"><span style="font-weight:800;color:#3b82f6;width:44px;text-align:center;font-size:14px">${num}</span><div style="flex:1;min-width:0"><div style="font-size:13px;color:#a3a3a3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.address.replace(/^\d+\s*/,"")}</div>${h.owner?`<div style="font-size:11px;color:#525252">${h.owner}</div>`:""}</div></div>`}).join("");
showView("v-parsed")}

// RENDER
function renderKPI(target,cn,hot,kn){
$(target).innerHTML=`<div class="kpi-card kpi-green"><div class="kpi-num">${cn}</div><div class="kpi-lbl">Connected</div></div><div class="kpi-card kpi-red"><div class="kpi-num">${hot}</div><div class="kpi-lbl">🔥 Hot Leads</div></div><div class="kpi-card kpi-blue"><div class="kpi-num">${kn}</div><div class="kpi-lbl">To Knock</div></div>`}

function updateRevenue(){
const sold=results.filter(r=>kGet(r)==="sold").length;
const proj=results.filter(r=>score(r)>=75).length;
$("rev-amount").textContent="$"+(sold*450);
$("rev-sold").textContent=sold+" sold × $450";
$("rev-projected").textContent="~"+(Math.round(proj*.15))+" more projected"}

function updatePills(){
const counts={};results.forEach(r=>{const k=kGet(r);if(k)counts[k]=(counts[k]||0)+1});
const total=Object.values(counts).reduce((a,b)=>a+b,0);
if(!total){$("knock-pills").innerHTML="";return}
const icons={sold:"💰",noint:"❌",nothome:"🏠",callback:"📞",later:"⏰"};
$("knock-pills").innerHTML=Object.entries(counts).map(([k,v])=>`<span class="pill">${icons[k]||""} ${v}</span>`).join("")}

function renderList(){
const q=($("search-box")?.value||"").toLowerCase();
let list=results.filter(r=>{
const s=score(r),k=kGet(r);
if(filterMode==="hot"&&s<75)return false;
if(filterMode==="knock"&&(!r.inRipple||r.connected))return false;
if(filterMode==="skip"&&!r.connected)return false;
if(filterMode==="sold"&&k!=="sold")return false;
if(filterMode==="nothome"&&k!=="nothome")return false;
if(filterMode==="callback"&&k!=="callback")return false;
if(q&&!(r.owner||"").toLowerCase().includes(q)&&!r.street.toLowerCase().includes(q))return false;
return true});

if(sortMode==="score")list.sort((a,b)=>{const sa=score(a),sb=score(b);if(sa<0&&sb>=0)return 1;if(sb<0&&sa>=0)return-1;return sb-sa});
else if(sortMode==="street")list.sort((a,b)=>a.street.localeCompare(b.street)||a.num-b.num);
else if(sortMode==="date")list.sort((a,b)=>(b.date||"0").localeCompare(a.date||"0"));
else if(sortMode==="walk")list.sort((a,b)=>a.street!==b.street?a.street.localeCompare(b.street):a.num%2!==b.num%2?(b.num%2)-(a.num%2):a.num-b.num);

$("result-list").innerHTML=list.map(r=>{
const s=score(r),ri=results.indexOf(r),k=kGet(r);
const sc=s>=75?"hi":s>=50?"md":s>=0?"lo":"no";
const badge=r.connected?'<span class="badge b-skip">Skip</span>':s>=75?'<span class="badge b-hot">Hot</span>':r.inRipple?'<span class="badge b-knock">Knock</span>':'<span class="badge b-na">N/A</span>';
const kc=KOPTS.find(o=>o.v===k)?.c||"";
let sel='<select class="sel '+kc+'" onchange="event.stopPropagation();kSet('+ri+',this.value)" onclick="event.stopPropagation()">';
KOPTS.forEach(o=>{sel+=`<option value="${o.v}"${k===o.v?" selected":""}>${o.l}</option>`});sel+="</select>";

const isOpen=openIdx===ri;
const p=pitch(r);

return`<div><div class="row" onclick="togglePitch(${ri})"><div class="row-score ${sc}">${s>=0?s:"—"}</div><div class="row-body"><div class="row-top"><div><span class="row-num">${r.num}</span> <span class="row-street">${r.street}</span></div>${badge}</div><div class="row-owner">${r.owner||"—"}</div>${r.date?`<div class="row-date">${r.date}</div>`:""}</div><div class="row-right">${sel}</div></div><div class="pitch${isOpen?" open":""}"><div class="pitch-type">Your pitch</div><div class="pitch-msg">${p}</div><div class="pitch-actions"><button class="pitch-btn pitch-btn-copy" onclick="navigator.clipboard.writeText('${p.replace(/'/g,"\\'")}');this.textContent='Copied!'">Copy pitch</button></div></div></div>`}).join("")}

function togglePitch(ri){openIdx=openIdx===ri?-1:ri;renderList()}
function setFilter(f){filterMode=f;document.querySelectorAll(".chips:nth-of-type(1) .chip").forEach(c=>c.classList.remove("on"));$("f-"+f)?.classList.add("on");renderList()}
function sortBy(k){sortMode=k;document.querySelectorAll(".chips:nth-of-type(2) .chip").forEach(c=>c.classList.remove("on"));$("sb-"+k)?.classList.add("on");renderList()}

// CHECK
async function runCheck(){
showView("v-running");stopped=false;results=[];const aC={},sC={};
for(let i=0;i<homes.length;i++){if(stopped)break;
const h=homes[i],num=h.address.match(/^\d+/)?.[0]||"";
const stM=h.address.match(/\d+\s+(.+?)(?:\s+(?:Statesville|Monroe|Indian Trail|Carthage|Whispering|High Point|NC|28\d))/i);
const street=stM?stM[1].trim():h.address.replace(/^\d+\s*/,"").split(/\s+NC/i)[0].trim();
const kw=street.split(" ")[0].toLowerCase();
$("run-addr").textContent=num+" "+street;$("run-count").textContent=(i+1)+"/"+homes.length;
$("run-bar").style.width=((i+1)/homes.length*100)+"%";
$("run-eta").textContent="~"+Math.max(1,Math.round((homes.length-i)*8/60))+" min left";
try{if(!sC[kw]){sC[kw]=await api(API+"/predefined-premises?address="+encodeURIComponent(h.address)+"&service_provider=ripple");await wait(5000)}
const arr=sC[kw]?.addressArray||[];const match=arr.find(a=>(a.full_text.startsWith(num+",")||a.full_text.startsWith(num+" "))&&a.full_text.toLowerCase().includes(kw));
if(!match)results.push({num:parseInt(num)||0,street,address:h.address,owner:h.owner,inRipple:false,fiber:false,connected:false,date:""});
else{const aid=match.area_id||"";if(aid&&!aC[aid]){await wait(3000);aC[aid]=await api(API+"/area-has-fiber?areaId="+aid+"&service_provider=ripple")}
const fiber=aC[aid]?.areaHasFiber==="Connected";let connected=false;
if(match.premise_id){await wait(3000);const sd=await api(API+"/query-existing-service?premiseGuid="+match.premise_id+"&service_provider=ripple");if(sd?.premiseHasService)connected=true}
results.push({num:parseInt(num)||0,street,address:h.address,owner:h.owner,inRipple:true,fiber,connected,date:match.created_at?.slice(0,10)||""})}}
catch(e){results.push({num:parseInt(num)||0,street,address:h.address,owner:h.owner,inRipple:false,fiber:false,connected:false,date:""})}
const cn=results.filter(r=>r.connected).length,kn=results.filter(r=>r.inRipple&&!r.connected).length,ht=results.filter(r=>score(r)>=75).length;
renderKPI("run-stats",cn,ht,kn)}
save();showResults()}

function stopCheck(){stopped=true;save();showResults()}

function showResults(){
showView("v-results");
const cn=results.filter(r=>r.connected).length,kn=results.filter(r=>r.inRipple&&!r.connected).length,ht=results.filter(r=>score(r)>=75).length;
renderKPI("res-stats",cn,ht,kn);updateRevenue();updatePills();renderList()}

function downloadCSV(){
const sorted=[...results].sort((a,b)=>score(b)-score(a));
let csv="Score,House,Street,Address,Owner,Fiber,Connected,Created,Result,Pitch\n";
csv+=sorted.map(r=>`${score(r)},${r.num},"${r.street}","${r.address}","${r.owner||""}",${r.fiber?"YES":"NO"},${r.connected?"YES":"NO"},${r.date},${kGet(r)||""},"${pitch(r).replace(/"/g,'""')}"`).join("\n");
const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);
a.download="Ripple_"+new Date().toISOString().slice(0,10)+".csv";a.click()}

function printKnock(){
const knock=results.filter(r=>r.inRipple&&!r.connected).sort((a,b)=>score(b)-score(a));
let h='<html><head><style>body{font-family:Arial;font-size:11px;margin:20px}h1{font-size:16px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:5px 6px;text-align:left}th{background:#111;color:#fff;font-size:9px}.hot{background:#fff8e1}.pitch{font-size:10px;color:#555;font-style:italic;max-width:260px;word-wrap:break-word}.res{width:70px}</style></head><body>';
h+='<h1>Knock List — '+new Date().toLocaleDateString()+'</h1><p>'+knock.length+' doors</p>';
h+='<table><tr><th>Score</th><th>#</th><th>Street</th><th>Owner</th><th>Pitch</th><th class="res">Result</th></tr>';
knock.forEach(r=>{h+='<tr class="'+(score(r)>=75?"hot":"")+'"><td>'+score(r)+'</td><td>'+r.num+'</td><td>'+r.street+'</td><td>'+(r.owner||"—").slice(0,22)+'</td><td class="pitch">'+pitch(r)+'</td><td class="res"></td></tr>'});
h+='</table></body></html>';const w=window.open();w.document.write(h);w.document.close();w.print()}

function resetAll(){homes=[];results=[];ks={};openIdx=-1;$("input").value="";sortMode="score";filterMode="all";
try{localStorage.removeItem(SK);localStorage.removeItem(KK)}catch(e){}showView("v-input")}

checkResume();
</script>
</body>
